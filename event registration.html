<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cricket registration</title>
    <link rel="stylesheet" href="stylesheet/style.css">
  </head>
  <body>
    <header>
      <h1>CRICKET CLUB</h1>
      <hr />
    </header>
    <section>
      <form>
        <p>This form contains cricket event club registration for under 19</p>
        <div>
          <label for="NAME">
            NAME:
            <input placeholder="type your name" type="text" />
          </label>
        </div>
        <br />
        <div>
            <label for="experience">
  Years of Experience:
</label>

<input type="number" id="experience"min="0"max="15"
>
        </div>
        <br>
        <div>
          <label for="Age">
            age:
            <input placeholder="type your age" type="number" />
          </label>
        </div>
        <br />
        <div>
          <label for="DOB">
            Date of birth:
            <input type="date" id="dob" name="dob" />
          </label>
        </div>

        <div>
          <p>Gender:</p>

          <input type="radio" id="male" name="gender" />
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender" />
          <label for="female">Female</label>
        </div>
        <br />
        <div>
          <label for="type of player">
            type of player:
            <select id="type">
              <option value="Batsman">Batsman</option>
              <option value="Bowler">Bowler</option>
              <option value="Allrounder">Allrounder</option>
            </select>
          </label>
        </div>
        <br />
        <div>
          <label for="phone">Phone Number:</label>
          <input
            type="tel"
            id="phone"
            placeholder="Enter mobile number"
            required
          />
          
        </div>
        <br />
        <div>
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="Enter email" required />
          <br />
          </label>
        </div>
        <br/>
          <div>
            <label for="addrees">
              address:
              <textarea
                name="addrees"
                id="addrees"
                rows="4"
                cols="30"
              ></textarea>
             
            </label>
          </div>
           <br />
        </div>
        <div>
            <label for="jersey">
  Jersey Size:
</label>

<select id="jersey">
  <option>S</option>
  <option>M</option>
  <option>L</option>
  <option>XL</option>
</select>
        </div>
        <br />
        <button type="submit">Submit Registration</button>
        <button type="reset">Reset Form</button>
      </form>
    </section>
  </body>
</html>
