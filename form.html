<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login form</title>
  </head>
  <body>
    <form>
      <label for="password">
        password:
        <input type="password" />
      </label>
      <label for="username">
        username:
        <input
          placeholder="type your name"
          type="text"
          name="username"
          id="username"
        />
      </label>
    </form>
    <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
    <label for="progress">70% Completion</label>
    <progress id="progress" value="70" max="100"></progress>
  </body>
</html>
